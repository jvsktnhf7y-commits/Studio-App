<!DOCTYPE html>
<html>
<head>
    <title>Studio Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 18px;
        }
        
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .nav-card {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .nav-card:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .nav-emoji {
            font-size: 64px;
            display: block;
            margin-bottom: 15px;
        }
        
        .nav-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .nav-desc {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .logout-card {
            background: #fee;
        }
        
        .logout-card:hover {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }
        
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }
            .header {
                padding: 25px;
            }
            .nav-card {
                padding: 25px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎵 Studio Console</h1>
            <p class="subtitle">Your complete music studio management system</p>
        </div>
        
        <div class="nav-grid">
            <a href="/students" class="nav-card">
                <span class="nav-emoji">👥</span>
                <div class="nav-title">Students</div>
                <div class="nav-desc">Manage student profiles & credits</div>
            </a>
            
            <a href="/rates" class="nav-card">
                <span class="nav-emoji">💰</span>
                <div class="nav-title">Rates & Pricing</div>
                <div class="nav-desc">Configure lesson packages</div>
            </a>
            
            <a href="/schedule" class="nav-card">
                <span class="nav-emoji">📅</span>
                <div class="nav-title">Schedule</div>
                <div class="nav-desc">Book new lessons</div>
            </a>
            
            <a href="/change-password" class="nav-card">
                <span class="nav-emoji">🔐</span>
                <div class="nav-title">Security</div>
                <div class="nav-desc">Change your password</div>
            </a>
            
            <a href="/logout" class="nav-card logout-card">
                <span class="nav-emoji">🚪</span>
                <div class="nav-title">Logout</div>
                <div class="nav-desc">End your session</div>
            </a>
        </div>
    </div>
</body>
</html>
