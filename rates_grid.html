<!DOCTYPE html>
<html>
<head>
    <title>Pricing Plans | Studio Console</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 48px;
            color: white;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #a0a0a0;
            font-size: 18px;
        }
        
        /* Pricing cards grid */
        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .pricing-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .pricing-card:hover {
            transform: translateY(-10px);
        }
        
        .plan-name {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1a1a2e;
        }
        
        .plan-price {
            font-size: 48px;
            font-weight: bold;
            color: #e94560;
            margin: 20px 0;
        }
        
        .plan-price small {
            font-size: 16px;
            color: #666;
        }
        
        .plan-duration {
            color: #666;
            margin-bottom: 20px;
        }
        
        .btn-edit {
            background: #e94560;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-top: 30px;
        }
        
        .btn-back {
            display: inline-block;
            background: #6b7280;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 Pricing Plans</h1>
            <p class="subtitle">Choose a pricing structure for your studio</p>
        </div>
        
        <div class="pricing-grid">
            {pricing_cards}
        </div>
        
        <div class="form-card">
            <h2>➕ Add New Plan</h2>
            <form action="/save-pricing-tier" method="post">
                <div class="form-group">
                    <label>Plan Name</label>
                    <input type="text" name="tier_name" required>
                </div>
                <div class="form-group">
                    <label>Hourly Rate ($)</label>
                    <input type="number" step="0.01" name="hourly_rate" required>
                </div>
                <div class="form-group">
                    <label>Lesson Length (minutes)</label>
                    <input type="number" name="target_minutes" value="60" required>
                </div>
                <button type="submit">Create Plan</button>
            </form>
        </div>
        
        <div style="text-align: center;">
            <a href="/dashboard">← Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
