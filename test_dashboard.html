<!DOCTYPE html>
<html>
<head>
    <title>Studio Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .welcome {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 24px;
            margin-bottom: 30px;
        }
        h1 {
            font-size: 48px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .nav-card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            text-decoration: none;
            color: #333;
            transition: all 0.3s;
            display: block;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .nav-emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="welcome">
            <h1>🎵 Studio Console</h1>
            <p>Your complete music studio management system</p>
        </div>
        
        <div class="nav-grid">
            <a href="/students" class="nav-card">
                <span class="nav-emoji">👥</span>
                <strong>Students</strong>
            </a>
            <a href="/rates" class="nav-card">
                <span class="nav-emoji">💰</span>
                <strong>Rates</strong>
            </a>
            <a href="/schedule" class="nav-card">
                <span class="nav-emoji">📅</span>
                <strong>Schedule</strong>
            </a>
            <a href="/change-password" class="nav-card">
                <span class="nav-emoji">🔐</span>
                <strong>Change Password</strong>
            </a>
            <a href="/logout" class="nav-card">
                <span class="nav-emoji">🚪</span>
                <strong>Logout</strong>
            </a>
        </div>
    </div>
</body>
</html>
